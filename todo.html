<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel's Daily To-Do — Abs By AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.8rem; color: #666; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .col-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #555; margin-bottom: 1rem; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; transition: background 0.15s; user-select: none; }
  .task:hover { background: #1a1a1a; }
  .task.done { opacity: 0.35; }
  .task.done .task-text { text-decoration: line-through; }
  .badge { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; margin-top: 1px; }
  .high { background: #7f1d1d; color: #fca5a5; }
  .mid  { background: #78350f; color: #fcd34d; }
  .low  { background: #1f2937; color: #9ca3af; }
  .task-text { font-size: 0.88rem; line-height: 1.45; color: #d4d4d4; }
  .check-box { flex-shrink: 0; width: 16px; height: 16px; border: 1.5px solid #444; border-radius: 4px; margin-top: 3px; margin-left: auto; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
  .task.done .check-box { background: #2d5a27; border-color: #4ade80; }
  .check-box svg { display: none; }
  .task.done .check-box svg { display: block; }
</style>
</head>
<body>
<h1>Daniel's Daily To-Do</h1>
<p class="subtitle" id="dateLabel"></p>
<div class="grid">
  <div><div class="col-title">Business</div><div id="business"></div></div>
  <div><div class="col-title">Personal</div><div id="personal"></div></div>
</div>
<script>
const TODAY = new Date().toISOString().slice(0,10);
const STORE_KEY = 'todo-' + TODAY;

const business = [
  { text: "Get analytics fully working with all costs reflected", p: "high" },
  { text: "Add generation limiting feature to app", p: "high" },
  { text: "Add pay for generations to app", p: "high" },
  { text: "Add email capture to app", p: "mid" },
  { text: "Set up email autoresponder", p: "mid" },
  { text: "Add shipping costs to app", p: "mid" },
  { text: "Create workout program", p: "low" },
];

const personal = [
  { text: "Work out", p: "high" },
  { text: "Supplements", p: "high" },
  { text: "Shower", p: "high" },
  { text: "Eat salad", p: "high" },
  { text: "Call fence company", p: "mid" },
  { text: "Call title company", p: "mid" },
  { text: "Try Abs By AI photo on match.com", p: "mid" },
  { text: "Make eyebrow threading appointment", p: "low" },
  { text: "Make haircut appointment", p: "low" },
  { text: "Take out trash", p: "low" },
  { text: "Do dishes", p: "low" },
  { text: "Put away sheets", p: "low" },
  { text: "Put away Amazon package", p: "low" },
  { text: "Review dating apps", p: "low" },
];

let completed = new Set();

function getKey(container, text) {
  return container + ':' + text;
}

function saveToLocalStorage() {
  localStorage.setItem(STORE_KEY, JSON.stringify([...completed]));
}

async function syncToServer() {
  try {
    const res = await fetch('/api/todo-state');
    const data = await res.json();
    if (data.date === TODAY && Array.isArray(data.completed)) {
      completed = new Set(data.completed);
      saveToLocalStorage();
      render();
    } else {
      const stored = localStorage.getItem(STORE_KEY);
      if (stored) { completed = new Set(JSON.parse(stored)); }
      render();
    }
  } catch (e) {
    const stored = localStorage.getItem(STORE_KEY);
    if (stored) { completed = new Set(JSON.parse(stored)); }
    render();
  }
}

async function postToServer() {
  try {
    await fetch('/api/todo-state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: [...completed], date: TODAY })
    });
  } catch (e) {}
}

function checkSVG() {
  return '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function renderList(items, containerId, container) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach((item, i) => {
    const key = getKey(container, item.text);
    const done = completed.has(key);
    const div = document.createElement('div');
    div.className = 'task' + (done ? ' done' : '');
    div.innerHTML =
      '<div class="badge ' + item.p + '">' + (i + 1) + '</div>' +
      '<span class="task-text">' + item.text + '</span>' +
      '<div class="check-box">' + checkSVG() + '</div>';
    div.addEventListener('click', () => {
      if (completed.has(key)) { completed.delete(key); } else { completed.add(key); }
      saveToLocalStorage();
      postToServer();
      render();
    });
    el.appendChild(div);
  });
}

function render() {
  renderList(business, 'business', 'business');
  renderList(personal, 'personal', 'personal');
}

document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
syncToServer();
</script>
</body>
</html>
