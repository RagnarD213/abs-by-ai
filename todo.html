<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do — Abs By AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .date {
    text-align: center;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
  }
  .column h2 {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #222;
  }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .task:hover { background: #1a1a1a; }
  .task.done { opacity: 0.38; }
  .task.done .task-text { text-decoration: line-through; color: #555; }
  .badge {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 800;
    margin-top: 1px;
  }
  .badge.high { background: #7f1d1d; color: #fca5a5; }
  .badge.mid  { background: #78350f; color: #fcd34d; }
  .badge.low  { background: #1f1f1f; color: #777; }
  .check {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 2px solid #444;
    border-radius: 4px;
    margin-top: 2px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .task.done .check {
    background: #333;
    border-color: #555;
  }
  .check svg { display: none; }
  .task.done .check svg { display: block; }
  .task-text {
    font-size: 0.92rem;
    line-height: 1.45;
    color: #d0d0d0;
  }
  .sync-status {
    text-align: center;
    font-size: 0.75rem;
    color: #444;
    margin-top: 32px;
  }
</style>
</head>
<body>

<h1>Daily To-Do</h1>
<div class="date" id="dateLabel"></div>

<div class="grid">
  <div class="column">
    <h2>Business</h2>
    <div id="business-list"></div>
  </div>
  <div class="column">
    <h2>Personal</h2>
    <div id="personal-list"></div>
  </div>
</div>

<div class="sync-status" id="syncStatus">Syncing&hellip;</div>

<script>
const TODAY = new Date().toISOString().slice(0,10);
document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

const businessTasks = [
  { text: "Get analytics fully working with all costs reflected", priority: "high" },
  { text: "Add generation limiting feature to app", priority: "high" },
  { text: "Add pay for generations to app", priority: "high" },
  { text: "Add email capture to app", priority: "high" },
  { text: "Set up email autoresponder", priority: "mid" },
  { text: "Write outlines for test shoot", priority: "mid" },
  { text: "Fix Printify store name and picture issue", priority: "mid" },
  { text: "Add shipping costs to app", priority: "low" },
  { text: "Create workout program", priority: "low" }
];

const personalTasks = [
  { text: "Work out", priority: "high" },
  { text: "Supplements", priority: "high" },
  { text: "Shower", priority: "high" },
  { text: "Eat salad", priority: "high" },
  { text: "Call fence company", priority: "mid" },
  { text: "Call title company", priority: "mid" },
  { text: "Make eyebrow threading appointment", priority: "mid" },
  { text: "Find best mechanic to fix car", priority: "mid" },
  { text: "Take Audi to mechanic", priority: "mid" },
  { text: "Take out trash", priority: "low" },
  { text: "Cook rice", priority: "low" },
  { text: "Review dating apps", priority: "low" }
];

let completedKeys = new Set();

function key(containerId, text) {
  return containerId + ':' + text;
}

function renderList(containerId, tasks) {
  const el = document.getElementById(containerId + '-list');
  el.innerHTML = '';
  tasks.forEach((task, i) => {
    const k = key(containerId, task.text);
    const done = completedKeys.has(k);
    const div = document.createElement('div');
    div.className = 'task' + (done ? ' done' : '');
    div.innerHTML = '<div class="badge ' + task.priority + '">' + (i+1) + '</div>' +
      '<div class="check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none">' +
      '<path d="M1 4L3.5 6.5L9 1" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg></div>' +
      '<div class="task-text">' + task.text + '</div>';
    div.addEventListener('click', () => toggleTask(containerId, task.text, k));
    el.appendChild(div);
  });
}

function toggleTask(containerId, text, k) {
  if (completedKeys.has(k)) {
    completedKeys.delete(k);
  } else {
    completedKeys.add(k);
  }
  renderAll();
  syncToServer();
}

function renderAll() {
  renderList('business', businessTasks);
  renderList('personal', personalTasks);
}

async function syncToServer() {
  document.getElementById('syncStatus').textContent = 'Saving...';
  try {
    const res = await fetch('/api/todo-state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: Array.from(completedKeys), date: TODAY })
    });
    document.getElementById('syncStatus').textContent = res.ok
      ? 'Saved · ' + new Date().toLocaleTimeString()
      : 'Save failed';
  } catch(e) {
    document.getElementById('syncStatus').textContent = 'Offline';
  }
}

async function loadFromServer() {
  try {
    const res = await fetch('/api/todo-state');
    if (res.ok) {
      const data = await res.json();
      if (data.date === TODAY && Array.isArray(data.completed)) {
        completedKeys = new Set(data.completed);
      }
    }
    document.getElementById('syncStatus').textContent = 'Loaded · ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('syncStatus').textContent = 'Offline';
  }
  renderAll();
}

loadFromServer();
</script>
</body>
</html>
