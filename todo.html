<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do — Abs By AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .date {
    text-align: center;
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }
  .column h2 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #222;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .item:hover { background: #1a1a1a; }
  .item.checked { opacity: 0.4; }
  .item.checked .label { text-decoration: line-through; color: #555; }
  .badge {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .high { background: #7f1d1d; color: #fca5a5; }
  .mid  { background: #78350f; color: #fcd34d; }
  .low  { background: #1f2937; color: #9ca3af; }
  .checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid #444;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .item.checked .checkbox { background: #333; border-color: #333; }
  .checkbox::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid #0f0f0f;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: none;
  }
  .item.checked .checkbox::after { display: block; }
  .label { font-size: 0.88rem; line-height: 1.4; color: #d0d0d0; }
  .sync-status { text-align: center; font-size: 0.75rem; color: #444; margin-top: 32px; }
</style>
</head>
<body>

<h1>Daily To-Do</h1>
<div class="date" id="dateLabel"></div>

<div class="grid">
  <div class="column">
    <h2>Business</h2>
    <div id="business-list"></div>
  </div>
  <div class="column">
    <h2>Personal</h2>
    <div id="personal-list"></div>
  </div>
</div>

<div class="sync-status" id="syncStatus">Syncing...</div>

<script>
const TODAY = new Date().toISOString().slice(0,10);
document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

const BUSINESS = [
  { text: "Add generation limiting feature to app", priority: "high" },
  { text: "Add pay for generations to app", priority: "high" },
  { text: "Add email capture to app", priority: "high" },
  { text: "Set up email autoresponder", priority: "mid" },
  { text: "Write outlines for test shoot", priority: "mid" },
  { text: "Fix Printify store name and picture issue", priority: "mid" },
  { text: "Add shipping costs to app", priority: "low" },
  { text: "Create workout program", priority: "low" },
];

const PERSONAL = [
  { text: "Work out", priority: "high" },
  { text: "Supplements", priority: "high" },
  { text: "Shower", priority: "high" },
  { text: "Eat salad", priority: "high" },
  { text: "Call fence company", priority: "mid" },
  { text: "Call title company", priority: "mid" },
  { text: "Make eyebrow threading appointment", priority: "mid" },
  { text: "Find best mechanic to fix car", priority: "mid" },
  { text: "Take Audi to mechanic", priority: "low" },
  { text: "Take out trash", priority: "low" },
  { text: "Review dating apps", priority: "low" },
];

let completed = new Set();

function key(containerId, text) { return containerId + ':' + text; }
function badgeClass(p) { return p === 'high' ? 'high' : p === 'mid' ? 'mid' : 'low'; }

function renderList(containerId, items) {
  const el = document.getElementById(containerId + '-list');
  el.innerHTML = '';
  items.forEach((item, i) => {
    const k = key(containerId, item.text);
    const div = document.createElement('div');
    div.className = 'item' + (completed.has(k) ? ' checked' : '');
    div.innerHTML = `
      <div class="badge ${badgeClass(item.priority)}">${i+1}</div>
      <div class="checkbox"></div>
      <div class="label">${item.text}</div>
    `;
    div.addEventListener('click', () => toggle(containerId, item.text));
    el.appendChild(div);
  });
}

function toggle(containerId, text) {
  const k = key(containerId, text);
  if (completed.has(k)) completed.delete(k); else completed.add(k);
  renderList('business', BUSINESS);
  renderList('personal', PERSONAL);
  syncToServer();
}

async function syncToServer() {
  try {
    const res = await fetch('/api/todo-state', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ completed: [...completed], date: TODAY })
    });
    if (res.ok) document.getElementById('syncStatus').textContent = 'Saved ✓  ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('syncStatus').textContent = 'Offline';
  }
}

async function loadFromServer() {
  try {
    const res = await fetch('/api/todo-state');
    const data = await res.json();
    if (data.date === TODAY && Array.isArray(data.completed)) {
      completed = new Set(data.completed);
    }
  } catch(e) {}
  renderList('business', BUSINESS);
  renderList('personal', PERSONAL);
  document.getElementById('syncStatus').textContent = 'Loaded ✓';
}

loadFromServer();
</script>
</body>
</html>
