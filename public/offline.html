<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — Abs by AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f6f5f2;
    color: #1b1a18;
    min-height: 100vh;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  img { width: 180px; margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  p { color: #6e6b64; font-size: 15px; line-height: 1.5; max-width: 320px; margin-bottom: 24px; }
  button {
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: #2f5fe0;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(47,95,224,0.32);
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="/img/logo.png" alt="Abs by AI" />
    <h1>You're offline</h1>
    <p>Abs by AI needs an internet connection to generate your transformation. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
